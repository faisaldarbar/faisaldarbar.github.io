<h1>Contact Me</h1>

<form id="my-form" action="https://formspree.io/f/mblyqqok" method="POST">
  <label for="email">Email</label><br>
  <input type="email" name="email" id="email" required><br><br>

  <label for="message">Message</label><br>
  <textarea name="message" id="message" rows="5" required></textarea><br><br>

  <!-- ✅ Your site key goes here -->
  <div class="g-recaptcha" data-sitekey="6LdUop0gAAAAANw7Q5G2wffaxTxMmWF-TCd_BwHk"></div><br>

  <button type="submit">Submit</button><br><br>

  <p id="my-form-status"></p>
</form>

<!-- ✅ Google reCAPTCHA JS -->
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    var form = document.getElementById("my-form");

    form.addEventListener("submit", async function handleSubmit(event) {
      event.preventDefault();
      var status = document.getElementById("my-form-status");

      // ✅ Get reCAPTCHA token
      var recaptchaToken = grecaptcha.getResponse();
      if (!recaptchaToken) {
        status.innerHTML = "<span style='color:red;'>Please complete the reCAPTCHA.</span>";
        return;
      }

      var data = new FormData(form);
      data.append("g-recaptcha-response", recaptchaToken); // ✅ must be exactly this name

      fetch(form.action, {
        method: form.method,
        body: data,
        headers: {
          'Accept': 'application/json'
        }
      }).then(response => {
        if (response.ok) {
          status.innerHTML = "<span style='color:green;'>Thanks for your submission!</span>";
          form.reset();
          grecaptcha.reset(); // reset reCAPTCHA
        } else {
          response.json().then(data => {
            if (Object.hasOwn(data, 'errors')) {
              status.innerHTML = data.errors.map(error => error.message).join(", ");
            } else {
              status.innerHTML = "Oops! There was a problem submitting your form.";
            }
            console.error("Formspree error:", data);
          });
        }
      }).catch(error => {
        status.innerHTML = "Oops! There was a problem submitting your form.";
        console.error("Fetch error:", error);
      });
    });
  });
</script>

<h1>Contact Me</h1>

<form id="my-form" action="https://formspree.io/f/mblyqqok" method="POST">
  <label for="email">Email</label><br>
  <input type="email" name="email" id="email" required><br><br>

  <label for="message">Message</label><br>
  <textarea name="message" id="message" rows="5" required></textarea><br><br>

  <!-- ✅ reCAPTCHA v2 checkbox (replace with your real site key) -->
  <div class="g-recaptcha"
       data-sitekey="6LdUop0gAAAAANw7Q5G2wffaxTxMmWF-TCd_BwHk"
       data-callback="onRecaptchaSuccess"></div><br>

  <button type="submit">Submit</button><br><br>

  <p id="my-form-status"></p>
</form>

<!-- ✅ Google reCAPTCHA script -->
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<script>
  // Triggered automatically by reCAPTCHA once the checkbox is solved
  function onRecaptchaSuccess() {
    const form = document.getElementById("my-form");
    const status = document.getElementById("my-form-status");

    const recaptchaToken = grecaptcha.getResponse();
    if (!recaptchaToken) {
      status.innerHTML = "<span style='color:red;'>Please complete the reCAPTCHA.</span>";
      return;
    }

    const data = new FormData(form);
    data.append("g-recaptcha-response", recaptchaToken);

    fetch(form.action, {
      method: "POST",
      body: data,
      headers: {
        "Accept": "application/json"
      }
    })
    .then(response => {
      if (response.ok) {
        status.innerHTML = "<span style='color:green;'>Thanks for your submission!</span>";
        form.reset();
        grecaptcha.reset();
      } else {
        response.json().then(data => {
          if (Object.hasOwn(data, 'errors')) {
            status.innerHTML = data.errors.map(error => error.message).join(", ");
          } else {
            status.innerHTML = "Oops! There was a problem submitting your form.";
          }
          console.error("Formspree error:", data);
        });
      }
    })
    .catch(error => {
      status.innerHTML = "Oops! There was a problem submitting your form.";
      console.error("Fetch error:", error);
    });
  }

  // Prevent default form submit — user must solve reCAPTCHA to trigger AJAX
  document.getElementById("my-form").addEventListener("submit", function (e) {
    e.preventDefault(); // disable normal submit
  });
</script>
